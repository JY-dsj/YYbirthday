<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>生日快乐</title>
    <style>
        body {
            background-image: url("1.webp");
            background-size: cover;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            text-align: center;
            font-family: Arial, sans-serif;
        }

        .section {
            margin: 20px 0;
            padding: 20px;
            background-color: rgba(255, 255, 255, 0.8);
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 80%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: left; /* 或者保持center，根据你的设计需求 */
        }

        .section p {
            margin: 0 0 10px; /* 在寄语和链接之间增加一些间距 */
        }

        .button-link {
            text-decoration: none;
            color: #000;
            font-size: 18px;
            padding: 10px 20px;
            border-radius: 5px;
            transition: background-color 0.3s ease, transform 0.3s ease;
            text-align: center; /* 确保链接内的文本居中（虽然这里不是必需的，因为<a>默认就是内联元素） */
            display: inline-block; /* 使链接能够应用宽度和高度 */
        }

        .button-link:hover {
            background-color: #f0f0f0;
            transform: scale(1.05); /* 悬停时稍微放大 */
        }
    </style>
</head>
<body>
<div class="section">
    <p>"回望过去的一年，你的笑容、努力和成长，都如同璀璨星辰，照亮了我们共同的记忆。愿这一年里的每一份努力，都在今天这个特别的日子里，化作最甜蜜的果实。生日快乐！"</p>
    <a href="1.html" class="button-link">过去</a>
</div>
<div class="section">
    <p>"亲爱的朋友，生日快乐！愿你在新的一岁里，每一天都如星光般璀璨，生活因你的笑容而更加美好。"</p>
    <a href="2.html" class="button-link">现在</a>
</div>
<div class="section">
    <p>"在你未来的每一天里，愿快乐像空气一样无处不在，让你的心灵永远被温暖和光明所包围，让笑容成为你永恒的魅力。"</p>
    <a href="3.html" class="button-link">未来</a>
</div>
</body>
</html>
